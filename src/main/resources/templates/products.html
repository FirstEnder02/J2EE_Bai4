<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>List products</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <a class="btn btn-success" th:href="@{/products/create}">Create new product</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Image</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${listproduct}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td><img th:src="@{/images/{img}(img=${p.image})}" height="120" width="150" /></td>
                <td th:text="${p.category.name}"></td>
                <td>
                    <a th:href="@{/products/edit/{id}(id=${p.id})}">Edit</a>
                    |
                    <a th:href="@{/products/delete/{id}(id=${p.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
